services:
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: mcp
            POSTGRES_PASSWORD: mcp
            POSTGRES_DB: mcp
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
            interval: 5s
            timeout: 5s
            retries: 10

    backend:
        build:
            context: .
            dockerfile: backend/Dockerfile
        restart: unless-stopped
        command: >
            sh -c "python -c \"from backend.Database.config import create_tables; create_tables()\" &&
            uvicorn backend.api.routes.serverAPI:app --host 0.0.0.0 --port 8000 --reload"
        environment:
            DATABASE_URL: postgresql+psycopg2://mcp:mcp@db:5432/mcp
            GOOGLE_API_KEY: ${GOOGLE_API_KEY}
            PINECONE_API_KEY: ${PINECONE_API_KEY}
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./:/app

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        restart: unless-stopped
        environment:
            VITE_API_URL: http://localhost:8000
        ports:
            - "3000:3000"
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules

volumes:
    pgdata:
    frontend_node_modules:
    