services:
    backend:
        build:
            context: .
            dockerfile: backend/Dockerfile

        restart: unless-stopped

        command: >
            sh -c "python -c \"from backend.Database.config import create_tables; create_tables()\" &&
            uvicorn backend.api.routes.serverAPI:app --host 0.0.0.0 --port 8000 --reload"

        environment:
            DATABASE_URL: ${DATABASE_URL}
            GOOGLE_API_KEY: ${GOOGLE_API_KEY}
            PINECONE_API_KEY: ${PINECONE_API_KEY}

        ports:
            - "8000:8000"

        volumes:
            - ./:/app

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev

        restart: unless-stopped

        environment:
            VITE_API_URL: http://localhost:8000

        ports:
            - "3000:3000"

        depends_on:
            - backend

        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules

volumes:
    frontend_node_modules: